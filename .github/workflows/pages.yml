name: Build and deploy tariff tracker site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Rebuild core site data
        run: python src/export_site_data.py

      - name: Validate core site data
        run: python src/validate_exported_site_data.py

      - name: Rebuild worldwide layer
        run: python src/run_worldwide_refresh.py

      - name: Assert worldwide artifacts exist
        run: |
          test -f site/data/world_goods_scores.json
          test -f site/data/world_pair_registry.json
          test -f site/data/world_refresh_manifest.json

      - name: Setup Pages
        uses: actions/configure-pages@v6.0.0

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0