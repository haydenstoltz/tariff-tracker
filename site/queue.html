<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tariff Tracker — Build Queue</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="wrap">
<nav class="section-nav" aria-label="Tracker sections">
  <a class="section-tab" href="./index.html?v=20260408d">Feed</a>
  <a class="section-tab" href="./map.html?v=20260408d">Map</a>
  <a class="section-tab" href="./registry.html?v=20260408d">Event Registry</a>
  <a class="section-tab" href="./cases.html?v=20260408d">Case Library</a>
  <a class="section-tab is-active" href="./queue.html?v=20260408d">Build Queue</a>
  <a class="section-tab" href="./world.html?v=20260408d">Worldwide</a>
  <a class="section-tab" href="./news.html?v=20260408d">Trade News</a>
  <a class="section-tab" href="./docs.html?v=20260408d">Documentation</a>

    <section class="panel" id="buildQueueSection">
      <div class="section-head">
        <div>
          <h2>Case Build Queue</h2>
          <p class="sub portfolio-sub"></p>
        </div>
      </div>

      <div class="toolbar-bar">
        <div class="filter-block">
          <label for="queuePriorityFilter">Queue priority</label>
          <select id="queuePriorityFilter">
            <option value="actionable">Actionable only (high + medium)</option>
            <option value="all">All priorities</option>
            <option value="high">High only</option>
            <option value="medium">Medium only</option>
            <option value="low">Low only</option>
            <option value="none">None only</option>
          </select>
        </div>

        <div class="filter-block">
          <label for="queueStageFilter">Planned stage</label>
          <select id="queueStageFilter">
            <option value="all">All stages</option>
          </select>
        </div>

        <div class="toolbar-actions">
          <button id="downloadBuildQueueCsv" type="button" class="secondary-button">Download build queue CSV</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="data-table build-queue-table" id="buildQueueTable">
          <thead>
            <tr>
              <th>Event</th>
              <th>Authority</th>
              <th>Effective</th>
              <th>Planned stage</th>
              <th>Priority</th>
              <th>Coverage status</th>
              <th>Candidate notes</th>
              <th>Source</th>
            </tr>
          </thead>
          <tbody id="buildQueueTableBody">
            <tr>
              <td colspan="8">Loading build queue...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./app.js?v=13"></script>
</body>
</html>
