<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tariff Tracker — Case Library</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="wrap">
<nav class="section-nav" aria-label="Tracker sections">
  <a class="section-tab" href="./index.html?v=20260408c">Feed</a>
  <a class="section-tab" href="./map.html?v=20260408c">Map</a>
  <a class="section-tab" href="./registry.html?v=20260408c">Event Registry</a>
  <a class="section-tab is-active" href="./cases.html?v=20260408c">Case Library</a>
  <a class="section-tab" href="./queue.html?v=20260408c">Build Queue</a>
  <a class="section-tab" href="./world.html?v=20260408c">Worldwide</a>
  <a class="section-tab" href="./docs.html?v=20260408c">Documentation</a>
</nav>

    <section class="panel portfolio-map-panel" id="caseLibrarySection">
      <div class="section-head">
        <div>
          <h2>Portfolio by event and stage</h2>
          <p class="sub portfolio-sub"></p>
        </div>
      </div>

      <div id="portfolioStageGrid" class="portfolio-stage-grid">
        <div class="portfolio-stage-empty">Loading portfolio map...</div>
      </div>
    </section>

    <section class="panel">
      <div class="section-head">
        <div>
          <h2>Case Portfolio</h2>
          <p class="sub portfolio-sub"></p>
        </div>
      </div>

      <div class="toolbar-bar">
        <div class="filter-block">
          <label for="portfolioSort">Sort portfolio</label>
          <select id="portfolioSort">
            <option value="m6_desc">6m effect: largest first</option>
            <option value="m12_desc">12m effect: largest first</option>
            <option value="event_asc">Event title: A to Z</option>
            <option value="event_desc">Event title: Z to A</option>
            <option value="authority_asc">Authority: A to Z</option>
            <option value="confidence_desc">Confidence: high to low</option>
          </select>
        </div>

        <div class="toolbar-actions">
          <button id="downloadPortfolioCsv" type="button" class="secondary-button">Download portfolio CSV</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="data-table portfolio-table" id="portfolioTable">
          <thead>
            <tr>
              <th>Event</th>
              <th>Case</th>
              <th>Authority</th>
              <th>Source</th>
              <th>Confidence</th>
              <th>3m</th>
              <th>6m</th>
              <th>12m</th>
              <th>Sign</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="portfolioTableBody">
            <tr>
              <td colspan="10">Loading portfolio...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./app.js?v=14"></script>
</body>
</html>
